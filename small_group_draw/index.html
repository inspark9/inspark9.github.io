      "안지우, 중3",
      "홍예찬, 중3",
      "권나율, 중3",
      "남이준, 중2",
      "유다현, 중2",
      "전시우, 중1",
      "심하은, 중1"
    ];

    const app = document.getElementById("app");
    const modalRoot = document.getElementById("modalRoot");
    const confettiCanvas = document.getElementById("confetti");
    const confettiCtx = confettiCanvas.getContext("2d");

    let state = loadState();
    let isPicking = false;
    let isShuffling = false;
    let audioCtx = null;
    let confettiPieces = [];
    let confettiFrame = null;
    let celebratedPickKey = null;
    let scheduledSettlementKey = null;
    let menuOpen = false;

    render();
    sizeConfettiCanvas();
    window.addEventListener("resize", sizeConfettiCanvas);

    window.addEventListener("beforeunload", (event) => {
      if (hasActiveProgress() && state.view !== "board") {
        event.preventDefault();
        event.returnValue = "";
      }
    });

    app.addEventListener("click", (event) => {
      const actionEl = event.target.closest("[data-action]");
      const capsuleEl = event.target.closest("[data-capsule-id]");
      const menuEl = event.target.closest(".app-menu");

      if (menuOpen && !menuEl && !capsuleEl) {
        menuOpen = false;
        render();
        return;
      }

      if (capsuleEl) {
        pickCapsule(capsuleEl);
        return;
      }

      if (!actionEl) return;
      const action = actionEl.dataset.action;
      const value = actionEl.dataset.value;

      if (action === "toggleMenu") {
        menuOpen = !menuOpen;
        render();
        return;
      }

      if (action === "view") {
        menuOpen = false;
        setView(value);
      }

      if (action === "continue") {
        menuOpen = false;
        continueProgress();
      }

      if (action === "fillSample") {
        menuOpen = false;
        fillSampleRoster();
      }

      if (action === "sampleStart") {
        menuOpen = false;
        fillSampleRoster(false);
        startDrawing();
      }

      if (action === "parseRoster") {
        menuOpen = false;
        parseRosterFromTextarea();
      }

      if (action === "clearRoster") {
        confirmAction("명단 비우기", "입력된 이름을 모두 지울까요?", () => {
          state.participants = [];
          clearRunArtifacts();
          saveState();
          render();
        });
      }

      if (action === "addParticipant") {
        addParticipant();
      }

      if (action === "deleteParticipant") {
        deleteParticipant(value);
      }

      if (action === "startDrawing") {
        menuOpen = false;
        startDrawing();
      }

      if (action === "nextTurn") {
        menuOpen = false;
        moveToNextTurn();
      }

      if (action === "undo") {
        menuOpen = false;
        undoLast();
      }

      if (action === "shuffleCapsules") {
        menuOpen = false;
        shuffleCapsules();
      }

      if (action === "resetProgress") {
        confirmAction("처음부터 다시", "진행 중인 뽑기 기록을 지우고 다시 시작할까요?", () => {
          resetProgress();
          state.view = "settings";
          saveState();
          render();
        });
      }

      if (action === "resetAll") {
        confirmAction("전체 초기화", "설정과 진행 기록을 모두 지울까요?", () => {
          localStorage.removeItem(STORAGE_KEY);
          state = defaultState();
          render();
        });
      }

      if (action === "toggleMute") {
        state.muted = !state.muted;
        menuOpen = false;
        saveState();
        render();
      }

      if (action === "autoPick") {
        menuOpen = false;
        const firstCapsule = state.capsules[0];
        if (!isShuffling && firstCapsule) pickCapsule({ dataset: { capsuleId: firstCapsule.id } });
      }

      if (action === "print") {
        menuOpen = false;
        window.print();
      }
    });

    app.addEventListener("change", (event) => {
      const target = event.target;

      if (target.matches("[data-config]")) {
        updateConfig(target.dataset.config, target.value);
      }

      if (target.matches("[data-group-name]")) {
        const group = state.groups.find((item) => item.id === target.dataset.groupName);
        if (group) {
          group.name = target.value.trim() || group.name;
          saveState();
          render();
        }
      }

      if (target.matches("[data-participant-name]")) {
        const participant = findParticipant(target.dataset.participantName);
        if (participant) {
          participant.name = target.value.trim() || participant.name;
          saveState();
          render();
        }
      }

      if (target.matches("[data-participant-role]")) {
        const participant = findParticipant(target.dataset.participantRole);
        if (participant) {
          participant.role = target.value;
          clearRunArtifacts();
          saveState();
          render();
        }
      }
    });

    modalRoot.addEventListener("click", (event) => {
      const action = event.target.closest("[data-modal-action]")?.dataset.modalAction;
      if (!action && event.target !== modalRoot) return;
      if (action === "confirm" && modalRoot._onConfirm) modalRoot._onConfirm();
      closeModal();
    });

    function defaultState() {
      return {
        version: STATE_VERSION,
        view: "start",
        config: {
          groupCount: 4,
          groupSize: 5,
          roleCounts: {
            lower: 3,
            high2: 1,
            high3: 1,
            teacher: 1
          }
        },
        participants: [],
        groups: createGroups(4),
        phaseRole: "lower",
        currentParticipantId: null,
        capsules: [],
        phaseSlotCount: 0,
        lastPick: null,
        history: [],
        muted: false,
        startedAt: null,
        completedAt: null
      };
    }

    function createGroups(count, previous = []) {
      return Array.from({ length: count }, (_, index) => {
        const old = previous[index];
        return {
          id: old?.id || makeId("group"),
          name: old?.name || `${index + 1}조`,
          color: old?.color || GROUP_COLORS[index % GROUP_COLORS.length]
        };
      });
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== STATE_VERSION) return defaultState();
        return normalizeState(parsed);
      } catch (error) {
        return defaultState();
      }
    }

    function normalizeState(input) {
      const base = defaultState();
      const incomingRoleCounts = input.config?.roleCounts || {};
      const next = {
        ...base,
        ...input,
        config: {
          ...base.config,
          ...(input.config || {}),
          roleCounts: {
            lower: Number(incomingRoleCounts.lower ?? incomingRoleCounts.regular ?? base.config.roleCounts.lower),
            high2: Number(incomingRoleCounts.high2 ?? incomingRoleCounts.senior ?? base.config.roleCounts.high2),
            high3: Number(incomingRoleCounts.high3 ?? base.config.roleCounts.high3),
            teacher: Number(incomingRoleCounts.teacher ?? base.config.roleCounts.teacher)
          }
        },
        participants: Array.isArray(input.participants) ? input.participants : [],
        groups: Array.isArray(input.groups) ? input.groups : base.groups,
        capsules: Array.isArray(input.capsules) ? input.capsules : [],
        phaseSlotCount: Number(input.phaseSlotCount || 0),
        history: Array.isArray(input.history) ? input.history : []
      };

      next.groups = createGroups(Number(next.config.groupCount) || 4, next.groups);
      next.participants = next.participants.map((person) => ({
        id: person.id || makeId("person"),
        name: person.name || "이름 없음",
        role: normalizePersonRole(person.role),
        groupId: person.groupId || null
      }));
      next.capsules = next.capsules.map((capsule, index) => ({
        id: capsule.id || makeId("capsule"),
        label: capsule.label || index + 1,
        groupId: capsule.groupId,
        slotIndex: Number.isFinite(Number(capsule.slotIndex)) ? Number(capsule.slotIndex) : index
      }));
      if (!next.phaseSlotCount && next.capsules.length) next.phaseSlotCount = next.capsules.length;
      return next;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function makeId(prefix) {
      if (window.crypto?.randomUUID) return `${prefix}-${window.crypto.randomUUID()}`;
      return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setView(view) {
      state.view = view;
      if (view === "draw") prepareDrawView();
      saveState();
      render();
    }

    function render() {
      app.innerHTML = `
        ${renderAppMenu()}
        ${renderScreen()}
      `;
    }

    function renderAppMenu() {
      const progress = progressSummary();
      return `
        <div class="app-menu">
          <button class="menu-toggle" data-action="toggleMenu" aria-label="${menuOpen ? "메뉴 닫기" : "메뉴 열기"}" aria-expanded="${menuOpen ? "true" : "false"}">
            ${menuOpen ? "×" : "☰"}
          </button>
          ${menuOpen ? `
            <div class="menu-panel" role="menu" aria-label="화면 메뉴">
              <div class="menu-title">
                <strong>소그룹 캡슐 뽑기</strong>
                <span>${progress.assigned}/${progress.total}명 배정</span>
              </div>
              <div class="menu-actions">
                <button class="btn" role="menuitem" data-action="view" data-value="start">처음</button>
                <button class="btn" role="menuitem" data-action="view" data-value="settings">인원 설정</button>
                <button class="btn" role="menuitem" data-action="view" data-value="draw" ${canOpenDraw() ? "" : "disabled"}>뽑기 화면</button>
                <button class="btn" role="menuitem" data-action="view" data-value="board">전체 보드</button>
                <button class="btn" role="menuitem" data-action="toggleMute">${state.muted ? "소리 켜기" : "음소거"}</button>
              </div>
            </div>
          ` : ""}
        </div>
      `;
    }

    function renderScreen() {
      if (state.view === "settings") return renderSettings();
      if (state.view === "draw") return renderDraw();
      if (state.view === "reveal") return renderDraw();
      if (state.view === "board") return renderBoard();
      return renderStart();
    }

    function renderStart() {
      const hasProgress = hasActiveProgress();
      return `
        <main class="screen hero">
          <section class="hero-copy">
            <h2 class="hero-title">ON 청소년부 <span>소그룹</span> 캡슐</h2>
            <div class="hero-actions">
              <button class="btn purple" data-action="${hasProgress ? "continue" : "view"}" data-value="settings">${hasProgress ? "이어하기" : "설정하기"}</button>
              ${hasProgress ? `<button class="btn coral" data-action="resetAll">전체 초기화</button>` : ""}
              <button class="btn teal" data-action="sampleStart">샘플로 리허설</button>
              <button class="btn" data-action="view" data-value="board">전체 보드</button>
            </div>
          </section>
          <section class="stage-preview" aria-label="캡슐 미리보기">
            <div class="preview-orbit">
              <div class="preview-capsule"></div>
              <div class="preview-capsule"></div>
              <div class="preview-capsule"></div>
              <div class="preview-capsule"></div>
              <div class="preview-capsule"></div>
              <div class="preview-capsule"></div>
            </div>
          </section>
        </main>
      `;
    }

    function renderSettings() {
      const validation = validateSetup();
      return `
        <main class="screen settings-screen">
          <section class="panel settings-panel">
            <div class="panel-head">
              <div>
                <h2>인원 설정</h2>
                <p>기본값은 4개 조 기준 기본 5명, 고3 1명은 캡슐 4개 중 1개를 뽑아 한 조에 추가 배정됩니다.</p>
              </div>
              <div class="toolbar">
                <button class="btn" data-action="resetProgress">진행 초기화</button>
                <button class="btn coral" data-action="resetAll">전체 초기화</button>
              </div>
            </div>
            <div class="panel-body settings-grid">
              <div class="stack settings-controls">
                <div class="form-grid">
                  <label>조 수
                    <input type="number" min="1" max="12" value="${state.config.groupCount}" data-config="groupCount">
                  </label>
                  <label>조당 인원
                    <input type="number" min="1" max="20" value="${state.config.groupSize}" data-config="groupSize">
                  </label>
                </div>
                <div class="form-grid">
                  <label>고1·중3·중2·중1/조
                    <input type="number" min="0" max="20" value="${state.config.roleCounts.lower}" data-config="roleCounts.lower">
                  </label>
                  <label>고2/조
                    <input type="number" min="0" max="20" value="${state.config.roleCounts.high2}" data-config="roleCounts.high2">
                  </label>
                  <label>고3 전체
                    <input type="number" min="0" max="20" value="${state.config.roleCounts.high3}" data-config="roleCounts.high3">
                  </label>
                  <label>교사/조
                    <input type="number" min="0" max="20" value="${state.config.roleCounts.teacher}" data-config="roleCounts.teacher">
                  </label>
                </div>
                <p class="muted">고1, 중3, 중2, 중1은 첫 단계에서 각 조 3명씩 배정됩니다. 고3은 전체 인원 기준으로 입력합니다.</p>
                ${renderValidation(validation)}
              </div>
              <div class="stack settings-roster">
                <label>이름 입력
                  <textarea id="rosterInput" spellcheck="false">${escapeHtml(rosterText())}</textarea>
                </label>
                <p class="muted">예: 온하준,교사 또는 온하준 교사</p>
                <div class="action-row">
                  <button class="btn teal" data-action="parseRoster">명단 반영</button>
                  <button class="btn" data-action="fillSample">샘플 채우기</button>
                  <button class="btn" data-action="addParticipant">한 명 추가</button>
                  <button class="btn" data-action="clearRoster">명단 비우기</button>
                  <button class="btn purple" data-action="startDrawing" ${validation.ok ? "" : "disabled"}>뽑기 시작</button>
                  <button class="btn" data-action="view" data-value="board">전체 보드</button>
                </div>
                <div class="divider"></div>
                <h3 class="section-title">조 이름</h3>
                <div class="group-editor">
                  ${state.groups.map((group, index) => `
                    <div class="group-edit-row">
                      <span class="color-dot" style="--dot:${group.color}"></span>
                      <input value="${escapeHtml(group.name)}" data-group-name="${group.id}" aria-label="${index + 1}번째 조 이름">
                      <span class="chip">${index + 1}</span>
                    </div>
                  `).join("")}
                </div>
              </div>
              ${renderRoleOverview()}
            </div>
          </section>
        </main>
      `;
    }

    function renderRoleOverview() {
      const grouped = Object.fromEntries(PERSON_ROLES.map((role) => [role, []]));
      state.participants.forEach((person) => {
        const role = normalizePersonRole(person.role);
        grouped[role].push(person);
      });

      return `
        <section class="role-overview" aria-label="역할별 인원 현황">
          ${PERSON_ROLES.map((role) => {
            const people = grouped[role] || [];
            return `
              <article class="role-card" style="${getRoleStyle(role)}">
                <h3>
                  <span>${getPersonRoleLabel(role)}</span>
                  <span class="role-count">${people.length}</span>
                </h3>
                <div class="role-names">
                  ${people.length
                    ? people.map((person) => `<span class="role-name-chip">${escapeHtml(person.name)}</span>`).join("")
                    : `<span class="role-name-chip">-</span>`}
                </div>
              </article>
            `;
          }).join("")}
        </section>
      `;
    }

    function renderParticipantRow(person) {
      return `
        <div class="participant-row">
          <input value="${escapeHtml(person.name)}" data-participant-name="${person.id}" aria-label="이름">
          <select data-participant-role="${person.id}" aria-label="역할">
            ${PERSON_ROLES.map((role) => `<option value="${role}" ${person.role === role ? "selected" : ""}>${PERSON_ROLE_META[role].label}</option>`).join("")}
          </select>
          <button class="small-btn" data-action="deleteParticipant" data-value="${person.id}" aria-label="${escapeHtml(person.name)} 삭제">×</button>
        </div>
      `;
    }

    function renderValidation(validation) {
      return `
        <div class="validation ${validation.ok ? "" : "danger"}">
          <div class="chip-row">
            ${PHASES.map((role) => {
              const item = validation.roles[role];
              return `<span class="chip ${item.ok ? "ok" : "bad"}">${ROLE_META[role].label} <strong>${item.actual}/${item.expected}</strong></span>`;
            }).join("")}
            <span class="chip ${validation.totalOk ? "ok" : "bad"}">전체 <strong>${validation.actualTotal}/${validation.expectedTotal}</strong></span>
          </div>
          <strong>${validation.ok ? "준비 완료" : validation.messages.join(" · ")}</strong>
        </div>
      `;
    }

    function renderDraw() {
      prepareDrawView();
      const pick = state.lastPick;
      const pickedPerson = pick ? findParticipant(pick.personId) : null;
      const pickedGroup = pick ? state.groups.find((item) => item.id === pick.groupId) : null;
      const role = pick ? getParticipantPhase(pick.role) : state.phaseRole;
      const meta = ROLE_META[role];
      const pending = getPendingParticipants(role);
      const current = pickedPerson || findParticipant(state.currentParticipantId) || pending[0];
      const currentRoleStyle = current ? getRoleStyle(current.role) : "";
      const canShuffle = !pick && state.capsules.length > 1 && !isPicking && !isShuffling;

      if (!pick && !current && isAllAssigned()) {
        state.view = "board";
        saveState();
        return renderBoard();
      }

      if (!pick && !current) {
        return `
          <main class="screen">
            <div class="empty-state">다음 단계로 이동 중입니다.</div>
          </main>
        `;
      }

      const onlyOne = !pick && state.capsules.length === 1;
      return `
        <main class="screen draw-layout">
          <section class="draw-main">
            <div class="callout">
              <div>
                <span class="phase-badge" style="--phase:${meta.color}">${meta.badge} · ${meta.title}</span>
                <div class="current-person-line">
                  <h2 class="current-name">${escapeHtml(current?.name || "결과 공개")}</h2>
                  ${current ? `<span class="current-role-tag" style="${currentRoleStyle}">${getPersonRoleLabel(current.role)}</span>` : ""}
                </div>
              </div>
              <div class="toolbar">
                ${onlyOne ? `<button class="btn teal" data-action="autoPick">자동 배정</button>` : ""}
                ${pick ? "" : `<button class="btn teal" data-action="shuffleCapsules" ${canShuffle ? "" : "disabled"}>캡슐 섞기</button>`}
                ${pick ? "" : `<button class="btn icon" title="되돌리기" data-action="undo" ${state.history.length && !isShuffling ? "" : "disabled"} aria-label="되돌리기">↶</button>`}
              </div>
            </div>
            <div class="capsule-stage ${pick ? "revealing" : ""}">
              ${pick ? renderInlineReveal(pick) : `
                <div class="capsule-ring ${isPicking || isShuffling ? "paused" : ""} ${isShuffling ? "shuffling" : ""}" aria-label="캡슐 선택">
                  ${renderCapsuleSlots()}
                </div>
              `}
            </div>
          </section>
          <aside class="side-panel">
            <section class="panel draw-side-section">
              <div class="panel-body stack">
                <h2 class="section-title">조별 현황</h2>
                <div class="progress-list">${state.groups.map(renderProgressCard).join("")}</div>
              </div>
            </section>
          </aside>
        </main>
      `;
    }

    function renderInlineReveal(pick) {
      const group = state.groups.find((item) => item.id === pick.groupId);
      const person = findParticipant(pick.personId);
      const color = group?.color || "#7c5cff";
      const settledClass = pick.settledAt ? " settled" : "";
      const complete = Boolean(pick.settledAt) && isAllAssigned();
      const actionsClass = pick.settledAt ? " visible" : "";
      const hiddenActionsAttr = pick.settledAt ? "" : "disabled";

      schedulePickCelebration(pick, color);
      schedulePickSettlement(pick);
      const startX = Number.isFinite(Number(pick.startX)) ? Number(pick.startX) : 0;
      const startY = Number.isFinite(Number(pick.startY)) ? Number(pick.startY) : 0;
      const midX = startX * 0.18;
      const midY = startY * 0.18;
      const ringAngle = Number.isFinite(Number(pick.ringAngle)) ? Number(pick.ringAngle) : 0;
      const ringAngleInverse = -ringAngle;
      const revealSize = getRevealCapsuleSize();
      const pickSize = Number.isFinite(Number(pick.capsuleSize)) ? Number(pick.capsuleSize) : revealSize * 0.54;
      const startScale = Math.max(0.38, Math.min(0.75, pickSize / revealSize));

      return `
        <div class="inline-reveal${settledClass}">
          ${renderRevealRouletteBackdrop(pick, ringAngle, ringAngleInverse)}
          <div class="revealed-capsule" style="--pick-x:${startX}px; --pick-y:${startY}px; --pick-mid-x:${midX}px; --pick-mid-y:${midY}px; --pick-start-scale:${startScale}" aria-hidden="true">
            <div class="capsule-shake-shell" style="--prize:${color}">
              <div class="prize-chip"></div>
              <div class="cap-half cap-left"></div>
              <div class="cap-half cap-right"></div>
            </div>
          </div>
          <div class="result-burst">
            <div class="result-stack">
              <div class="result-burst-card">
                <h2>${escapeHtml(person?.name || "이름")}<br>${escapeHtml(group?.name || "소그룹")} 합류!</h2>
              </div>
              <div class="result-actions${actionsClass}" aria-hidden="${pick.settledAt ? "false" : "true"}">
                <button class="btn purple" data-action="${complete ? "view" : "nextTurn"}" data-value="board" ${hiddenActionsAttr}>${complete ? "전체 보드" : "다음 사람"}</button>
                <button class="btn" data-action="undo" ${pick.settledAt && state.history.length ? "" : "disabled"}>되돌리기</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderRevealRouletteBackdrop(pick, ringAngle = 0, ringAngleInverse = 0) {
      const total = Math.max(pick.phaseSlotCount || state.phaseSlotCount || state.capsules.length, state.capsules.length, 1);
      const pickedSlot = Number.isFinite(Number(pick.capsuleSlotIndex)) ? Number(pick.capsuleSlotIndex) : -1;
      return `
        <div class="reveal-roulette-backdrop" style="--ring-angle:${ringAngle}deg; --ring-angle-inverse:${ringAngleInverse}deg" aria-hidden="true">
          <div class="capsule-ring">
            ${Array.from({ length: total }, (_, slotIndex) => {
              const capsule = state.capsules.find((item) => item.slotIndex === slotIndex);
              if (slotIndex === pickedSlot) return renderEmptyCapsuleSlot(slotIndex, total);
              if (!capsule) return renderEmptyCapsuleSlot(slotIndex, total);
              return renderDisplayCapsule(slotIndex, total);
            }).join("")}
          </div>
        </div>
      `;
    }

    function renderDisplayCapsule(slotIndex, total) {
      const angle = (360 / Math.max(total, 1)) * slotIndex;
      return `
        <button class="capsule" type="button" style="--angle:${angle}deg" tabindex="-1" aria-hidden="true">
          <span class="capsule-body"></span>
        </button>
      `;
    }

    function getRevealCapsuleSize() {
      if (typeof window === "undefined") return 190;
      return Math.max(145, Math.min(window.innerWidth * 0.26, 190));
    }

    function schedulePickCelebration(pick, color) {
      const celebrationKey = `${pick.personId}:${pick.pickedAt}`;
      if (celebratedPickKey === celebrationKey) return;
      celebratedPickKey = celebrationKey;
      window.setTimeout(() => {
        if (state.view === "draw" && state.lastPick?.personId === pick.personId && state.lastPick?.pickedAt === pick.pickedAt) {
          launchConfetti(color);
          playDing(color);
        }
      }, REVEAL_CELEBRATION_DELAY_MS);
    }

    function schedulePickSettlement(pick) {
      const settlementKey = `${pick.personId}:${pick.pickedAt}`;
      if (pick.settledAt || scheduledSettlementKey === settlementKey) return;
      scheduledSettlementKey = settlementKey;
      window.setTimeout(() => {
        const livePick = state.lastPick;
        const isSamePick = livePick?.personId === pick.personId && livePick?.pickedAt === pick.pickedAt;
        if (!isSamePick || livePick.settledAt) {
          if (scheduledSettlementKey === settlementKey) scheduledSettlementKey = null;
          return;
        }
        const person = findParticipant(livePick.personId);
        if (person) assign(person, livePick.groupId);
        livePick.settledAt = new Date().toISOString();
        state.currentParticipantId = pickRandomPendingParticipantId(state.phaseRole);
        if (isAllAssigned()) state.completedAt = state.completedAt || new Date().toISOString();
        scheduledSettlementKey = null;
        saveState();
        render();
      }, REVEAL_SETTLE_DELAY_MS);
    }

    function renderCapsuleSlots() {
      const total = Math.max(state.phaseSlotCount || state.capsules.length, state.capsules.length, 1);
      return Array.from({ length: total }, (_, slotIndex) => {
        const capsule = state.capsules.find((item) => item.slotIndex === slotIndex);
        return capsule ? renderCapsule(capsule, total) : renderEmptyCapsuleSlot(slotIndex, total);
      }).join("");
    }

    function renderCapsule(capsule, total) {
      const slotIndex = Number.isFinite(Number(capsule.slotIndex)) ? Number(capsule.slotIndex) : Number(capsule.label || 1) - 1;
      const angle = (360 / Math.max(total, 1)) * slotIndex;
      return `
        <button class="capsule" data-capsule-id="${capsule.id}" style="--angle:${angle}deg" aria-label="캡슐 선택">
          <span class="capsule-body">
            <span class="sr-only">캡슐 선택</span>
          </span>
        </button>
      `;
    }

    function renderEmptyCapsuleSlot(slotIndex, total) {
      const angle = (360 / Math.max(total, 1)) * slotIndex;
      return `
        <div class="capsule-slot" style="--angle:${angle}deg" aria-hidden="true">
          <span class="capsule-hole-mark"></span>
        </div>
      `;
    }

    function renderProgressCard(group) {
      const members = getGroupMembers(group.id);
      const target = getGroupTarget(group.id);
      const pct = Math.round((members.length / target) * 100);
      return `
        <article class="progress-card">
          <h3>
            <span><span class="color-dot" style="--dot:${group.color}"></span> ${escapeHtml(group.name)}</span>
            <span>${members.length}/${target}</span>
          </h3>
          <div class="progress-bar"><span style="--pct:${Math.min(pct, 100)}%; --bar:${group.color}"></span></div>
          ${members.length ? `
            <div class="progress-members">
              ${members.map(renderProgressMember).join("")}
            </div>
          ` : `<div class="progress-empty">아직 배정 전</div>`}
        </article>
      `;
    }

    function renderProgressMember(person) {
      const isAppearing = state.lastPick?.settledAt && state.lastPick.personId === person.id;
      return `
        <div class="progress-member ${isAppearing ? "appearing" : ""}" style="${getRoleStyle(person.role)}">
          <span class="progress-member-name">${escapeHtml(person.name)}</span>
          <span class="progress-member-role">${getPersonRoleLabel(person.role)}</span>
        </div>
      `;
    }

    function renderReveal() {
      const pick = state.lastPick;
      if (!pick) {
        state.view = "draw";
        saveState();
        return renderDraw();
      }

      const group = state.groups.find((item) => item.id === pick.groupId);
      const person = findParticipant(pick.personId);
      const color = group?.color || "#7c5cff";
      const members = getGroupMembers(pick.groupId);
      const complete = isAllAssigned();

      const celebrationKey = `${pick.personId}:${pick.pickedAt}`;
      if (celebratedPickKey !== celebrationKey) {
        celebratedPickKey = celebrationKey;
        window.setTimeout(() => {
          if (state.view === "reveal" && state.lastPick?.personId === pick.personId) {
            launchConfetti(color);
            playDing(color);
          }
        }, 920);
      }

      return `
        <main class="screen reveal-screen">
          <section class="reveal-stage" style="--revealWash:${hexToRgba(color, 0.18)}">
            <div class="revealed-capsule" aria-hidden="true">
              <div class="cap-half cap-left"></div>
              <div class="cap-half cap-right"></div>
            </div>
            <div class="result-burst">
              <div class="result-burst-card">
                <h2>${escapeHtml(person?.name || "이름")}<br>${escapeHtml(group?.name || "소그룹")} 합류!</h2>
              </div>
            </div>
          </section>
          <section class="result-grid">
            <div class="panel">
              <div class="panel-body stack">
                <h2 class="section-title">${escapeHtml(group?.name || "소그룹")}</h2>
                <div class="member-list">${members.map(renderMemberCard).join("")}</div>
              </div>
            </div>
            <div class="panel">
              <div class="panel-body stack">
                <h2 class="section-title">다음 진행</h2>
                <button class="btn purple" data-action="${complete ? "view" : "nextTurn"}" data-value="board">${complete ? "전체 보드" : "다음 사람"}</button>
                <button class="btn" data-action="undo" ${state.history.length ? "" : "disabled"}>되돌리기</button>
                <button class="btn" data-action="view" data-value="board">전체 보드</button>
              </div>
            </div>
          </section>
        </main>
      `;
    }

    function renderMemberCard(person) {
      return `
        <div class="member-card">
          <span class="member-card-name">${escapeHtml(person.name)}</span>
          <span class="role-tag ${person.role}" style="${getRoleStyle(person.role)}">${getPersonRoleLabel(person.role)}</span>
        </div>
      `;
    }

    function renderBoard() {
      const progress = progressSummary();
      return `
        <main class="screen">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h2>전체 보드</h2>
                <p>${progress.assigned}/${progress.total}명 배정 완료</p>
              </div>
              <div class="toolbar">
                <button class="btn purple" data-action="print">인쇄/PDF</button>
                <button class="btn" data-action="view" data-value="draw" ${canOpenDraw() && !isAllAssigned() ? "" : "disabled"}>뽑기</button>
                <button class="btn" data-action="undo" ${state.history.length ? "" : "disabled"}>되돌리기</button>
              </div>
            </div>
            <div class="panel-body">
              <div class="board-grid">
                ${state.groups.map((group) => {
                  const members = getGroupMembers(group.id);
                  const teachers = members.filter((person) => normalizePersonRole(person.role) === "teacher");
                  const students = members.filter((person) => normalizePersonRole(person.role) !== "teacher");
                  const teacherNames = teachers.map((person) => person.name).join(", ") || "미배정";
                  return `
                    <article class="group-board">
                      <h3>
                        <span class="color-dot" style="--dot:${group.color}"></span>
                        <span class="group-board-title">${escapeHtml(group.name)} <span class="group-board-teacher">(교사: ${escapeHtml(teacherNames)})</span></span>
                      </h3>
                      <div class="member-list">
                        ${students.length ? students.map(renderMemberCard).join("") : `<div class="empty-state">아직 학생 배정 전</div>`}
                      </div>
                    </article>
                  `;
                }).join("")}
              </div>
            </div>
          </section>
        </main>
      `;
    }

    function updateConfig(key, value) {
      const numeric = Math.max(0, Number(value) || 0);
      if (key === "groupCount") {
        state.config.groupCount = Math.max(1, Math.min(12, numeric));
        state.groups = createGroups(state.config.groupCount, state.groups);
      } else if (key === "groupSize") {
        state.config.groupSize = Math.max(1, Math.min(30, numeric));
      } else if (key.startsWith("roleCounts.")) {
        const role = key.split(".")[1];
        state.config.roleCounts[role] = Math.max(0, Math.min(30, numeric));
      }
      clearRunArtifacts();
      saveState();
      render();
    }

    function rosterText() {
      return state.participants.map((person) => {
        return `${person.name}, ${getPersonRoleLabel(person.role)}`;
      }).join("\n");
    }

    function parseRosterFromTextarea() {
      const textarea = document.getElementById("rosterInput");
      const lines = textarea ? textarea.value.split(/\r?\n/) : [];
      state.participants = lines
        .map(parseRosterLine)
        .filter(Boolean)
        .map((item) => ({
          id: makeId("person"),
          name: item.name,
          role: item.role,
          groupId: null
        }));
      state.history = [];
      state.capsules = [];
      state.phaseSlotCount = 0;
      state.lastPick = null;
      state.startedAt = null;
      state.completedAt = null;
      saveState();
      render();
    }

    function parseRosterLine(line) {
      const clean = line.trim();
      if (!clean) return null;
      const parts = clean.split(/[,/\t|]+/).map((part) => part.trim()).filter(Boolean);
      let name = parts[0];
      let roleText = parts.slice(1).join(" ");
      if (parts.length === 1) {
        const labelPattern = PERSON_ROLES.map((role) => PERSON_ROLE_META[role].label).join("|");
        const spacedMatch = clean.match(new RegExp(`^(.*?)\\s+(${labelPattern})$`));
        if (spacedMatch) {
          name = spacedMatch[1].trim();
          roleText = spacedMatch[2].trim();
        }
      }
      return {
        name,
        role: normalizePersonRole(roleText)
      };
    }

    function normalizePersonRole(text) {
      const compact = String(text || "").trim().replace(/\s+/g, "").toLowerCase();
      const aliases = {
        teacher: "teacher",
        leader: "teacher",
        "교사": "teacher",
        "선생님": "teacher",
        high3: "high3",
        "고3": "high3",
        "고등3": "high3",
        "고등3학년": "high3",
        high2: "high2",
        senior: "high2",
        "고2": "high2",
        "고등2": "high2",
        "고등2학년": "high2",
        high1: "high1",
        regular: "high1",
        "고1": "high1",
        "고등1": "high1",
        "고등1학년": "high1",
        middle3: "middle3",
        "중3": "middle3",
        "중등3": "middle3",
        "중등3학년": "middle3",
        middle2: "middle2",
        "중2": "middle2",
        "중등2": "middle2",
        "중등2학년": "middle2",
        middle1: "middle1",
        "중1": "middle1",
        "중등1": "middle1",
        "중등1학년": "middle1"
      };
      return aliases[compact] || "high1";
    }

    function getPersonRoleLabel(role) {
      return PERSON_ROLE_META[normalizePersonRole(role)]?.label || PERSON_ROLE_META.high1.label;
    }

    function getPersonRoleColor(role) {
      return PERSON_ROLE_META[normalizePersonRole(role)]?.color || PERSON_ROLE_META.high1.color;
    }

    function getRoleStyle(role) {
      const color = getPersonRoleColor(role);
      return `--role-color:${color}; --role-bg:${hexToRgba(color, 0.13)}`;
    }

    function getParticipantPhase(personOrRole) {
      const role = normalizePersonRole(typeof personOrRole === "string" ? personOrRole : personOrRole?.role);
      if (role === "teacher") return "teacher";
      if (role === "high3") return "high3";
      if (role === "high2") return "high2";
      return "lower";
    }

    function fillSampleRoster(shouldRender = true) {
      const defaults = defaultState();
      state.config = defaults.config;
      state.participants = SAMPLE_LINES.map(parseRosterLine).filter(Boolean).map((item) => ({
        id: makeId("person"),
        name: item.name,
        role: item.role,
        groupId: null
      }));
      state.groups = createGroups(state.config.groupCount);
      clearRunArtifacts();
      saveState();
      if (shouldRender) render();
    }

    function addParticipant() {
      state.participants.push({
        id: makeId("person"),
        name: `새 친구 ${state.participants.length + 1}`,
        role: "high1",
        groupId: null
      });
      clearRunArtifacts();
      saveState();
      render();
    }

    function deleteParticipant(id) {
      state.participants = state.participants.filter((person) => person.id !== id);
      clearRunArtifacts();
      saveState();
      render();
    }

    function clearRunArtifacts() {
      state.participants = state.participants.map((person) => ({ ...person, groupId: null }));
      state.phaseRole = "lower";
      state.currentParticipantId = null;
      state.capsules = [];
      state.phaseSlotCount = 0;
      state.lastPick = null;
      state.history = [];
      state.startedAt = null;
      state.completedAt = null;
      celebratedPickKey = null;
    }

    function validateSetup() {
      const roleCounts = countByRole();
      const groupCount = Number(state.config.groupCount) || 0;
      const groupSize = Number(state.config.groupSize) || 0;
      const basePerGroupRoles = ["lower", "high2", "teacher"];
      const perGroupSum = basePerGroupRoles.reduce((sum, role) => sum + Number(state.config.roleCounts[role] || 0), 0);
      const expectedTotal = groupCount * groupSize + Number(state.config.roleCounts.high3 || 0);
      const actualTotal = state.participants.length;
      const roles = {};
      const messages = [];

      PHASES.forEach((role) => {
        const expected = role === "high3"
          ? Number(state.config.roleCounts.high3 || 0)
          : groupCount * Number(state.config.roleCounts[role] || 0);
        const actual = roleCounts[role] || 0;
        roles[role] = {
          expected,
          actual,
          ok: expected === actual
        };
        if (expected !== actual) messages.push(`${ROLE_META[role].label} ${actual}/${expected}`);
      });

      if (perGroupSum !== groupSize) messages.push(`기본 조당 역할 합계 ${perGroupSum}/${groupSize}`);
      if (Number(state.config.roleCounts.high3 || 0) > groupCount) messages.push(`고3 전체 ${state.config.roleCounts.high3}/${groupCount} 이하`);
      if (actualTotal !== expectedTotal) messages.push(`전체 ${actualTotal}/${expectedTotal}`);

      return {
        ok: messages.length === 0 && actualTotal > 0,
        roles,
        expectedTotal,
        actualTotal,
        totalOk: actualTotal === expectedTotal,
        messages: messages.length ? messages : ["확인 완료"]
      };
    }

    function countByRole() {
      return state.participants.reduce((counts, person) => {
        const phase = getParticipantPhase(person);
        counts[phase] = (counts[phase] || 0) + 1;
        return counts;
      }, { lower: 0, high2: 0, high3: 0, teacher: 0 });
    }

    function startDrawing() {
      const validation = validateSetup();
      if (!validation.ok) {
        state.view = "settings";
        saveState();
        render();
        return;
      }
      state.participants = state.participants.map((person) => ({ ...person, groupId: null }));
      state.phaseRole = PHASES.find((role) => getParticipantsByRole(role).length > 0) || "lower";
      state.currentParticipantId = pickRandomPendingParticipantId(state.phaseRole);
      state.capsules = [];
      state.phaseSlotCount = 0;
      state.history = [];
      state.lastPick = null;
      state.startedAt = new Date().toISOString();
      state.completedAt = null;
      const pool = buildPhasePool(state.phaseRole);
      bindCapsules(pool);
      state.view = "draw";
      saveState();
      render();
    }

    function continueProgress() {
      if (isAllAssigned()) {
        state.view = "board";
      } else {
        state.view = "draw";
        prepareDrawView();
      }
      saveState();
      render();
    }

    function resetProgress() {
      state.participants = state.participants.map((person) => ({ ...person, groupId: null }));
      state.phaseRole = "lower";
      state.currentParticipantId = null;
      state.capsules = [];
      state.phaseSlotCount = 0;
      state.lastPick = null;
      state.history = [];
      state.startedAt = null;
      state.completedAt = null;
    }

    function prepareDrawView() {
      if (!canOpenDraw()) return;
      if (state.lastPick) return;
      if (isAllAssigned()) {
        state.view = "board";
        state.completedAt = state.completedAt || new Date().toISOString();
        return;
      }

      const activeRole = getActiveRole();
      if (!activeRole) return;

      if (state.phaseRole !== activeRole) {
        state.phaseRole = activeRole;
        state.currentParticipantId = pickRandomPendingParticipantId(activeRole);
        bindCapsules(buildPhasePool(activeRole));
      }

      const pending = getPendingParticipants(state.phaseRole);
      if (!pending.some((person) => person.id === state.currentParticipantId)) {
        state.currentParticipantId = pickRandomPendingParticipantId(state.phaseRole);
      }

      const shouldRebindCapsules = state.phaseRole === "high3"
        ? state.capsules.length < pending.length
        : state.capsules.length !== pending.length;

      if (shouldRebindCapsules) {
        bindCapsules(buildPhasePool(state.phaseRole));
      }
    }

    function moveToNextTurn() {
      if (state.lastPick && !state.lastPick.settledAt) return;
      if (isAllAssigned()) {
        state.completedAt = state.completedAt || new Date().toISOString();
        state.view = "board";
      } else {
        state.view = "draw";
        state.lastPick = null;
        prepareDrawView();
      }
      saveState();
      render();
    }

    function buildPhasePool(role) {
      if (role === "high3") {
        return shuffle(state.groups.map((group) => group.id));
      }

      const perGroup = Number(state.config.roleCounts[role] || 0);
      const pool = [];
      state.groups.forEach((group) => {
        for (let index = 0; index < perGroup; index += 1) {
          pool.push(group.id);
        }
      });
      return shuffle(pool);
    }

    function bindCapsules(pool) {
      state.phaseSlotCount = pool.length;
      state.capsules = pool.map((groupId, index) => ({
        id: makeId("capsule"),
        label: index + 1,
        groupId,
        slotIndex: index
      }));
    }

    function shuffleCapsules() {
      if (isPicking || isShuffling || state.lastPick || state.capsules.length < 2) return;

      const ring = app.querySelector(".capsule-ring");
      const shuffleButton = app.querySelector('[data-action="shuffleCapsules"]');
      const total = Math.max(state.phaseSlotCount || state.capsules.length, state.capsules.length, 1);
      const currentSlots = state.capsules.map((capsule, index) => {
        const slotIndex = Number(capsule.slotIndex);
        return Number.isFinite(slotIndex) ? slotIndex : index;
      });
      const nextSlots = shuffleSlotOrder(currentSlots);
      const moves = state.capsules.map((capsule, index) => ({
        capsule,
        slotIndex: nextSlots[index]
      }));

      isShuffling = true;
      playShuffle();
      if (shuffleButton) shuffleButton.disabled = true;

      if (ring) {
        ring.classList.add("paused", "shuffling");
        ring.setAttribute("aria-busy", "true");
      }

      const applyMoves = () => {
        moves.forEach(({ capsule, slotIndex }) => {
          capsule.slotIndex = slotIndex;
          const angle = (360 / Math.max(total, 1)) * slotIndex;
          const capsuleEl = ring?.querySelector(`[data-capsule-id="${capsule.id}"]`);
          if (capsuleEl) {
            capsuleEl.style.setProperty("--angle", `${angle}deg`);
          }
        });
        state.capsules.sort((left, right) => Number(left.slotIndex) - Number(right.slotIndex));
        saveState();
      };

      if (ring) {
        window.requestAnimationFrame(() => {
          window.requestAnimationFrame(applyMoves);
        });
      } else {
        applyMoves();
      }

      window.setTimeout(() => {
        isShuffling = false;
        if (ring) {
          ring.classList.remove("paused", "shuffling");
          ring.removeAttribute("aria-busy");
        }
        const liveShuffleButton = app.querySelector('[data-action="shuffleCapsules"]');
        if (liveShuffleButton && !state.lastPick && state.capsules.length > 1) liveShuffleButton.disabled = false;
      }, SHUFFLE_ANIMATION_MS + 140);
    }

    function shuffleSlotOrder(slots) {
      const original = slots.slice();
      let result = shuffle(original);
      let attempts = 0;
      while (attempts < 8 && result.every((slot, index) => slot === original[index])) {
        result = shuffle(original);
        attempts += 1;
      }
      if (result.every((slot, index) => slot === original[index])) {
        result = original.slice(1).concat(original[0]);
      }
      return result;
    }

    function pickCapsule(el) {
      if (isPicking || isShuffling) return;
      const capsuleId = el.dataset.capsuleId;
      const capsule = state.capsules.find((item) => item.id === capsuleId);
      const person = findParticipant(state.currentParticipantId);
      if (!capsule || !person) return;
      const startOffset = getCapsuleStartOffset(el);

      isPicking = true;
      playRoll();
      pushHistory();
      state.capsules = state.capsules.filter((item) => item.id !== capsuleId);
      state.lastPick = {
        personId: person.id,
        groupId: capsule.groupId,
        role: person.role,
        capsuleSlotIndex: capsule.slotIndex,
        phaseSlotCount: state.phaseSlotCount || state.capsules.length,
        startX: startOffset.x,
        startY: startOffset.y,
        ringAngle: startOffset.ringAngle,
        capsuleSize: startOffset.capsuleSize,
        settledAt: null,
        pickedAt: new Date().toISOString()
      };

      state.view = "draw";
      saveState();

      isPicking = false;
      render();
    }

    function getCapsuleStartOffset(el) {
      const capsuleRect = el.getBoundingClientRect?.();
      const stageRect = el.closest?.(".capsule-stage")?.getBoundingClientRect?.();
      const ringAngle = getCurrentRotationDegrees(el.closest?.(".capsule-ring"));
      if (!capsuleRect || !stageRect) return { x: 0, y: 0, ringAngle, capsuleSize: 96 };
      return {
        x: (capsuleRect.left + capsuleRect.width / 2) - (stageRect.left + stageRect.width / 2),
        y: (capsuleRect.top + capsuleRect.height / 2) - (stageRect.top + stageRect.height / 2),
        ringAngle,
        capsuleSize: capsuleRect.width
      };
    }

    function getCurrentRotationDegrees(el) {
      if (!el) return 0;
      const transform = window.getComputedStyle(el).transform;
      if (!transform || transform === "none") return 0;
      try {
        const matrix = new DOMMatrixReadOnly(transform);
        const angle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
        return Number.isFinite(angle) ? angle : 0;
      } catch (error) {
        const values = transform.match(/matrix\(([^)]+)\)/)?.[1]?.split(",").map(Number);
        if (!values || values.length < 4) return 0;
        const angle = Math.atan2(values[1], values[0]) * (180 / Math.PI);
        return Number.isFinite(angle) ? angle : 0;
      }
    }

    function assign(person, groupId) {
      const target = typeof person === "string" ? findParticipant(person) : person;
      if (!target) return;
      target.groupId = groupId;
    }

    function undoLast() {
      if (isShuffling) return;
      if (!state.history.length) return;
      const remaining = state.history.slice(0, -1);
      const previous = state.history[state.history.length - 1];
      state = normalizeState(previous);
      state.history = remaining;
      state.view = state.view === "reveal" ? "draw" : state.view;
      state.completedAt = isAllAssigned() ? state.completedAt : null;
      saveState();
      render();
    }

    function pushHistory() {
      const { history, ...rest } = state;
      state.history.push(JSON.parse(JSON.stringify(rest)));
    }

    function getActiveRole() {
      return PHASES.find((role) => getPendingParticipants(role).length > 0) || null;
    }

    function getParticipantsByRole(role) {
      return state.participants.filter((person) => getParticipantPhase(person) === role);
    }

    function getPendingParticipants(role) {
      return state.participants.filter((person) => getParticipantPhase(person) === role && !person.groupId);
    }

    function pickRandomPendingParticipantId(role) {
      const pending = getPendingParticipants(role);
      if (!pending.length) return null;
      return pending[Math.floor(Math.random() * pending.length)].id;
    }

    function getGroupTarget(groupId, pendingPick = null) {
      let high3Members = state.participants.filter((person) => person.groupId === groupId && person.role === "high3").length;
      const pendingPerson = pendingPick ? findParticipant(pendingPick.personId) : null;
      const pendingRole = normalizePersonRole(pendingPick?.role);
      if (pendingPick?.groupId === groupId && pendingRole === "high3" && !pendingPerson?.groupId) {
        high3Members += 1;
      }
      return Number(state.config.groupSize || 0) + high3Members;
    }

    function getGroupMembers(groupId) {
      const phaseOrder = { teacher: 0, high3: 1, high2: 2, lower: 3 };
      const roleOrder = Object.fromEntries(PERSON_ROLES.map((role, index) => [role, index]));
      return state.participants
        .filter((person) => person.groupId === groupId)
        .slice()
        .sort((a, b) => {
          const phaseDiff = phaseOrder[getParticipantPhase(a)] - phaseOrder[getParticipantPhase(b)];
          if (phaseDiff !== 0) return phaseDiff;
          return roleOrder[a.role] - roleOrder[b.role] || a.name.localeCompare(b.name, "ko");
        });
    }

    function findParticipant(id) {
      return state.participants.find((person) => person.id === id);
    }

    function progressSummary() {
      const total = state.participants.length;
      const assigned = state.participants.filter((person) => person.groupId).length;
      return { total, assigned };
    }

    function hasActiveProgress() {
      return state.participants.some((person) => person.groupId) || state.capsules.length > 0 || state.history.length > 0;
    }

    function canOpenDraw() {
      return validateSetup().ok && state.participants.length > 0;
    }

    function isAllAssigned() {
      return state.participants.length > 0 && state.participants.every((person) => person.groupId);
    }

    function shuffle(items) {
      const result = items.slice();
      for (let index = result.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [result[index], result[swapIndex]] = [result[swapIndex], result[index]];
      }
      return result;
    }

    function confirmAction(title, message, onConfirm) {
      modalRoot._onConfirm = onConfirm;
      modalRoot.innerHTML = `
        <div class="modal">
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(message)}</p>
          <div class="action-row">
            <button class="btn coral" data-modal-action="confirm">확인</button>
            <button class="btn" data-modal-action="cancel">취소</button>
          </div>
        </div>
      `;
      modalRoot.classList.add("open");
    }

    function closeModal() {
      modalRoot.classList.remove("open");
      modalRoot.innerHTML = "";
      modalRoot._onConfirm = null;
    }

    function sizeConfettiCanvas() {
      const ratio = window.devicePixelRatio || 1;
      confettiCanvas.width = Math.floor(window.innerWidth * ratio);
      confettiCanvas.height = Math.floor(window.innerHeight * ratio);
      confettiCanvas.style.width = `${window.innerWidth}px`;
      confettiCanvas.style.height = `${window.innerHeight}px`;
      confettiCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function launchConfetti(color) {
      const palette = [color, "#ffbd3f", "#00a8a8", "#ee5ba8", "#ffffff"];
      const originX = window.innerWidth / 2;
      const originY = window.innerHeight * 0.36;
      for (let index = 0; index < 140; index += 1) {
        confettiPieces.push({
          x: originX,
          y: originY,
          vx: (Math.random() - 0.5) * 11,
          vy: -Math.random() * 9 - 2,
          size: Math.random() * 8 + 5,
          rotation: Math.random() * 360,
          spin: (Math.random() - 0.5) * 16,
          color: palette[index % palette.length],
          life: 110 + Math.random() * 40
        });
      }
      if (!confettiFrame) animateConfetti();
    }

    function animateConfetti() {
      confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      confettiPieces = confettiPieces.filter((piece) => piece.life > 0);
      confettiPieces.forEach((piece) => {
        piece.x += piece.vx;
        piece.y += piece.vy;
        piece.vy += 0.18;
        piece.rotation += piece.spin;
        piece.life -= 1;
        confettiCtx.save();
        confettiCtx.translate(piece.x, piece.y);
        confettiCtx.rotate((piece.rotation * Math.PI) / 180);
        confettiCtx.fillStyle = piece.color;
        confettiCtx.globalAlpha = Math.max(piece.life / 120, 0);
        confettiCtx.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.56);
        confettiCtx.restore();
      });

      if (confettiPieces.length) {
        confettiFrame = requestAnimationFrame(animateConfetti);
      } else {
        confettiFrame = null;
        confettiCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      }
    }

    function ensureAudio() {
      if (state.muted) return null;
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return null;
        audioCtx = new AudioContext();
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }

    function playTone(frequency, duration, type = "sine", gainValue = 0.05, delay = 0) {
      const ctx = ensureAudio();
      if (!ctx) return;
      const oscillator = ctx.createOscillator();
      const gain = ctx.createGain();
      oscillator.type = type;
      oscillator.frequency.value = frequency;
      gain.gain.setValueAtTime(0.0001, ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(gainValue, ctx.currentTime + delay + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + duration);
      oscillator.connect(gain);
      gain.connect(ctx.destination);
      oscillator.start(ctx.currentTime + delay);
      oscillator.stop(ctx.currentTime + delay + duration + 0.02);
    }

    function playRoll() {
      playTone(160, 0.08, "triangle", 0.03);
      playTone(210, 0.08, "triangle", 0.03, 0.08);
      playTone(260, 0.08, "triangle", 0.03, 0.16);
    }

    function playShuffle() {
      playTone(210, 0.07, "triangle", 0.026);
      playTone(260, 0.07, "triangle", 0.024, 0.08);
      playTone(190, 0.07, "triangle", 0.022, 0.16);
      playTone(300, 0.08, "triangle", 0.024, 0.24);
    }

    function playDing() {
      playTone(523.25, 0.16, "sine", 0.05);
      playTone(659.25, 0.18, "sine", 0.045, 0.08);
      playTone(783.99, 0.22, "sine", 0.04, 0.16);
    }

    function hexToRgba(hex, alpha) {
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean.length === 3 ? clean.split("").map((x) => x + x).join("") : clean, 16);
      const red = (bigint >> 16) & 255;
      const green = (bigint >> 8) & 255;
      const blue = bigint & 255;
      return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
    }

    window.capsuleDraw = {
      buildPhasePool,
      bindCapsules,
      pickCapsule,
      shuffleCapsules,
      assign,
      undoLast,
      getState: () => JSON.parse(JSON.stringify(state))
    };
  </script>
