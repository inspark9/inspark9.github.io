<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>청소년부 소그룹 캡슐 뽑기</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #657083;
      --line: #dfe5f1;
      --paper: #fffdfa;
      --wash: #f5f8ff;
      --purple: #7c5cff;
      --teal: #00a8a8;
      --coral: #ff6b5e;
      --pink: #ee5ba8;
      --gold: #ffbd3f;
      --green: #3dbb76;
      --danger: #e5484d;
      --shadow: 0 20px 55px rgba(30, 42, 75, 0.14);
      --radius: 8px;
      font-family: Pretendard, "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(135deg, rgba(124, 92, 255, 0.08), transparent 34%),
        linear-gradient(225deg, rgba(0, 168, 168, 0.1), transparent 36%),
        var(--paper);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      min-height: 44px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.14);
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.55;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 800;
      color: #2d374b;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr;
    }

    .app-menu {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 70;
    }

    .menu-toggle {
      display: inline-grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      border: 1px solid rgba(223, 229, 241, 0.92);
      box-shadow: 0 16px 36px rgba(32, 45, 72, 0.16);
      font-size: 28px;
      font-weight: 1000;
      line-height: 1;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .menu-panel {
      position: absolute;
      top: 62px;
      right: 0;
      width: 278px;
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(223, 229, 241, 0.92);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .menu-title {
      display: grid;
      gap: 3px;
      padding: 3px 4px 8px;
      border-bottom: 1px solid var(--line);
    }

    .menu-title strong {
      font-size: 18px;
      line-height: 1.2;
    }

    .menu-title span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .menu-actions {
      display: grid;
      gap: 8px;
    }

    .menu-actions .btn {
      width: 100%;
      justify-content: flex-start;
      min-height: 44px;
    }

    .screen {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: clamp(18px, 4vw, 46px) 0 56px;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      align-items: center;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 0.86fr);
      gap: clamp(26px, 5vw, 70px);
    }

    .hero-copy {
      display: grid;
      gap: 22px;
      align-content: center;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(42px, 8vw, 96px);
      line-height: 0.96;
      letter-spacing: 0;
      max-width: 760px;
    }

    .hero-title span {
      color: var(--purple);
    }

    .hero-text {
      color: #3c485c;
      font-size: clamp(18px, 2.1vw, 25px);
      line-height: 1.5;
      max-width: 680px;
      margin: 0;
      font-weight: 700;
    }

    .hero-actions,
    .action-row,
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 46px;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(35, 46, 75, 0.08);
      transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(35, 46, 75, 0.12);
    }

    .btn.primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .btn.purple {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
    }

    .btn.teal {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    .btn.coral {
      background: var(--coral);
      color: #fff;
      border-color: var(--coral);
    }

    .btn.icon {
      width: 46px;
      padding: 0;
      flex: 0 0 auto;
    }

    .stage-preview {
      min-height: 520px;
      position: relative;
      display: grid;
      place-items: center;
    }

    .preview-orbit {
      position: relative;
      width: min(100%, 520px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, #fff 0 31%, rgba(255, 255, 255, 0.65) 32% 41%, transparent 42%),
        conic-gradient(from 20deg, rgba(124, 92, 255, 0.24), rgba(0, 168, 168, 0.22), rgba(255, 107, 94, 0.2), rgba(238, 91, 168, 0.2), rgba(124, 92, 255, 0.24));
      box-shadow: var(--shadow);
      animation: breathe 4s ease-in-out infinite;
    }

    .preview-capsule {
      position: absolute;
      width: 96px;
      height: 96px;
      left: 50%;
      top: 50%;
      margin-left: -48px;
      margin-top: -48px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.96) 0 8%, rgba(255, 255, 255, 0.42) 9% 18%, transparent 19%),
        radial-gradient(circle at 72% 82%, rgba(23, 32, 51, 0.18), transparent 32%),
        linear-gradient(to bottom, #ef3f45 0 47%, #172033 48% 54%, #fbfdff 55% 100%);
      border: 4px solid #172033;
      box-shadow: inset 0 14px 20px rgba(255, 255, 255, 0.48), inset 0 -16px 24px rgba(36, 41, 68, 0.16), 0 16px 28px rgba(36, 41, 68, 0.24);
      transform: rotate(var(--angle)) translateY(-190px) rotate(calc(-1 * var(--angle)));
    }

    .preview-capsule::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #fff;
      border: 7px solid #172033;
      box-shadow: inset 0 3px 7px rgba(23, 32, 51, 0.15), 0 2px 8px rgba(23, 32, 51, 0.18);
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .preview-capsule::after {
      content: "";
      position: absolute;
      inset: 10%;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.54);
      background: radial-gradient(circle at 28% 20%, rgba(255, 255, 255, 0.56), transparent 25%);
      pointer-events: none;
    }

    .preview-capsule:nth-child(1) { --angle: 0deg; }
    .preview-capsule:nth-child(2) { --angle: 60deg; }
    .preview-capsule:nth-child(3) { --angle: 120deg; }
    .preview-capsule:nth-child(4) { --angle: 180deg; }
    .preview-capsule:nth-child(5) { --angle: 240deg; }
    .preview-capsule:nth-child(6) { --angle: 300deg; }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 12px 36px rgba(32, 45, 72, 0.08);
    }

    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 20px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2,
    .section-title {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      letter-spacing: 0;
      line-height: 1.12;
    }

    .panel-head p,
    .muted {
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.45;
    }

    .panel-body {
      padding: 20px;
    }

    .settings-screen {
      width: min(1360px, calc(100vw - 20px));
      padding: 10px 0 18px;
    }

    .settings-panel .panel-head {
      padding: 12px 16px;
    }

    .settings-panel .panel-head h2 {
      font-size: clamp(20px, 2vw, 28px);
    }

    .settings-panel .panel-head p,
    .settings-screen .muted {
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.35;
    }

    .settings-panel .panel-body {
      padding: 12px;
    }

    .settings-screen .stack {
      gap: 8px;
    }

    .settings-screen label {
      gap: 5px;
    }

    .settings-screen input,
    .settings-screen select {
      min-height: 36px;
      padding: 7px 9px;
    }

    .settings-screen textarea {
      min-height: 118px;
      max-height: 136px;
      padding: 8px 10px;
      line-height: 1.38;
    }

    .settings-screen .btn {
      min-height: 38px;
      padding: 8px 11px;
    }

    .settings-screen .small-btn {
      height: 34px;
      min-width: 34px;
    }

    .settings-screen .form-grid {
      gap: 8px;
    }

    .settings-screen .validation {
      padding: 9px;
      gap: 7px;
    }

    .settings-screen .chip {
      min-height: 28px;
      padding: 5px 8px;
      font-size: 13px;
    }

    .settings-screen .section-title {
      font-size: 18px;
    }

    .settings-screen .divider {
      margin: 1px 0;
    }

    .settings-screen .group-editor {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .settings-screen .group-edit-row {
      padding: 6px;
      gap: 6px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      grid-template-areas:
        "controls roster"
        "roles roles";
      gap: 10px;
      align-items: start;
    }

    .settings-controls {
      grid-area: controls;
    }

    .settings-roster {
      grid-area: roster;
    }

    .role-overview {
      grid-area: roles;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .role-card {
      display: grid;
      align-content: start;
      gap: 7px;
      min-height: 124px;
      padding: 8px;
      border-radius: var(--radius);
      border: 1px solid var(--role-color, var(--line));
      background: var(--role-bg, #fff);
    }

    .role-card h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin: 0;
      color: var(--role-color, var(--ink));
      font-size: 18px;
      line-height: 1.15;
    }

    .role-count {
      display: inline-grid;
      place-items: center;
      min-width: 28px;
      height: 24px;
      padding: 0 7px;
      border-radius: 999px;
      background: #fff;
      color: var(--role-color, var(--ink));
      border: 1px solid rgba(255, 255, 255, 0.74);
      font-size: 15px;
      font-weight: 1000;
    }

    .role-names {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-content: start;
    }

    .role-name-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: #263247;
      border: 1px solid rgba(255, 255, 255, 0.8);
      font-size: 17px;
      font-weight: 900;
      line-height: 1.15;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 8px 0;
    }

    .validation {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--wash);
    }

    .validation.danger {
      border-color: rgba(229, 72, 77, 0.45);
      background: rgba(229, 72, 77, 0.08);
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: #2f3a50;
      font-weight: 900;
      white-space: nowrap;
    }

    .chip strong {
      color: var(--ink);
    }

    .chip.ok {
      border-color: rgba(61, 187, 118, 0.45);
      color: #197048;
    }

    .chip.bad {
      border-color: rgba(229, 72, 77, 0.45);
      color: #b4232a;
      background: #fff7f7;
    }

    .group-editor,
    .participant-list,
    .member-list {
      display: grid;
      gap: 8px;
    }

    .group-edit-row,
    .participant-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .participant-row {
      grid-template-columns: minmax(0, 1fr) 120px auto;
    }

    .color-dot {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--dot, var(--purple));
      box-shadow: 0 0 0 4px rgba(23, 32, 51, 0.06);
      vertical-align: middle;
      flex: 0 0 auto;
    }

    .small-btn {
      display: inline-grid;
      place-items: center;
      min-width: 38px;
      height: 38px;
      padding: 0 10px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 900;
    }

    .draw-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 12px;
      align-items: stretch;
    }

    .screen.draw-layout {
      width: min(1240px, calc(100vw - 24px));
      padding: 6px 0 4px;
    }

    .draw-main {
      min-height: calc(100vh - 12px);
      display: grid;
      grid-template-rows: auto minmax(360px, 1fr);
      gap: 8px;
    }

    .callout {
      display: grid;
      gap: 16px;
      align-items: center;
      grid-template-columns: minmax(0, 1fr) auto;
      padding: clamp(12px, 1.5vw, 16px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 12px 36px rgba(32, 45, 72, 0.08);
    }

    .phase-badge {
      display: inline-flex;
      width: fit-content;
      padding: 7px 10px;
      border-radius: 999px;
      color: #fff;
      background: var(--phase, var(--purple));
      font-weight: 900;
      white-space: nowrap;
    }

    .current-name {
      margin: 6px 0 0;
      font-size: clamp(34px, 5.2vw, 64px);
      line-height: 0.98;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .current-person-line {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .current-role-tag {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 13px;
      border-radius: 999px;
      background: var(--role-bg, #f7f9fe);
      color: var(--role-color, var(--ink));
      border: 1px solid rgba(255, 255, 255, 0.78);
      font-size: clamp(18px, 2vw, 26px);
      font-weight: 1000;
      box-shadow: 0 8px 18px rgba(35, 46, 75, 0.08);
      white-space: nowrap;
    }

    .capsule-stage {
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(255, 189, 63, 0.14), transparent 42%),
        linear-gradient(225deg, rgba(0, 168, 168, 0.12), transparent 40%),
        #ffffff;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65), 0 12px 36px rgba(32, 45, 72, 0.08);
      min-height: 360px;
    }

    .capsule-stage.revealing {
      position: relative;
      place-items: stretch;
      background:
        linear-gradient(135deg, rgba(255, 189, 63, 0.14), transparent 42%),
        linear-gradient(225deg, rgba(0, 168, 168, 0.12), transparent 40%),
        #ffffff;
    }

    .inline-reveal {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 360px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .reveal-roulette-backdrop {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      transform-origin: center;
      animation: revealRouletteAway 2800ms ease-in-out 720ms both;
      z-index: 0;
    }

    .reveal-roulette-backdrop .capsule-ring {
      width: clamp(300px, 36vw, 430px);
      animation: spinRevealRing 20s linear infinite;
    }

    .reveal-roulette-backdrop .capsule-body {
      animation: keepRevealCapsuleUpright 20s linear infinite;
    }

    .reveal-roulette-backdrop .capsule,
    .reveal-roulette-backdrop .capsule-slot {
      pointer-events: none;
    }

    .inline-reveal .revealed-capsule {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(26vw, 190px);
      height: min(26vw, 190px);
      min-width: 145px;
      min-height: 145px;
      animation: selectedBallMove 3300ms cubic-bezier(.2,.78,.15,1) both;
      z-index: 2;
    }

    .capsule-shake-shell {
      position: absolute;
      inset: 0;
      transform-origin: center;
      animation: selectedBallShake 900ms ease-in-out 3200ms both;
    }

    .inline-reveal .result-burst {
      padding: 22px;
      z-index: 3;
    }

    .inline-reveal .result-burst h2 {
      font-size: clamp(30px, 4.8vw, 60px);
    }

    .inline-reveal .cap-half {
      animation-delay: 4050ms;
      animation-duration: 900ms;
    }

    .inline-reveal .prize-chip {
      animation-delay: 4660ms;
    }

    .inline-reveal .result-burst {
      animation-delay: 5520ms;
    }

    .capsule-ring {
      position: relative;
      width: clamp(300px, 36vw, 430px);
      aspect-ratio: 1;
      border-radius: 50%;
      animation: spinRing 20s linear infinite;
    }

    .capsule-ring.paused {
      animation-play-state: paused;
    }

    .capsule-ring.paused .capsule-body {
      animation-play-state: paused;
    }

    .capsule-ring.shuffling .capsule {
      z-index: 2;
      filter: brightness(1.08) saturate(1.08);
      transition: transform 1100ms cubic-bezier(.2,.88,.22,1), filter 260ms ease;
    }

    .capsule-ring.shuffling .capsule-body {
      animation-play-state: paused;
    }

    .capsule-ring::before {
      content: "";
      position: absolute;
      inset: 13%;
      border-radius: 50%;
      border: 2px dashed rgba(23, 32, 51, 0.12);
      background: radial-gradient(circle, rgba(255,255,255,0.86) 0 39%, transparent 40%);
    }

    .capsule,
    .capsule-slot {
      --radius-size: clamp(106px, 15vw, 170px);
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(72px, 7vw, 96px);
      height: clamp(72px, 7vw, 96px);
      margin-left: calc(clamp(72px, 7vw, 96px) / -2);
      margin-top: calc(clamp(72px, 7vw, 96px) / -2);
      border-radius: 50%;
      background: transparent;
      transform: rotate(var(--angle)) translateY(calc(-1 * var(--radius-size))) rotate(calc(-1 * var(--angle)));
      transform-origin: center;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .capsule:hover:not(:disabled) {
      filter: brightness(1.05);
      transform: rotate(var(--angle)) translateY(calc(-1 * var(--radius-size) - 6px)) rotate(calc(-1 * var(--angle))) scale(1.04);
    }

    .capsule-slot {
      pointer-events: none;
    }

    .capsule-hole-mark {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px dashed rgba(23, 32, 51, 0.18);
      background: rgba(255, 255, 255, 0.36);
      box-shadow: inset 0 0 18px rgba(23, 32, 51, 0.06);
    }

    .capsule-body {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 22%, rgba(255, 255, 255, 0.96) 0 8%, rgba(255, 255, 255, 0.42) 9% 18%, transparent 19%),
        radial-gradient(circle at 72% 82%, rgba(23, 32, 51, 0.19), transparent 33%),
        linear-gradient(to bottom, #ef3f45 0 47%, #172033 48% 54%, #fbfdff 55% 100%);
      box-shadow: inset 0 16px 24px rgba(255, 255, 255, 0.46), inset 0 -18px 28px rgba(36, 41, 68, 0.16), 0 18px 32px rgba(36, 41, 68, 0.28);
      border: 4px solid #172033;
      overflow: hidden;
      animation: keepCapsuleUpright 20s linear infinite;
    }

    .capsule-body::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 47%;
      height: 10%;
      background: #172033;
      box-shadow: 0 2px 6px rgba(23, 32, 51, 0.2);
    }

    .capsule-body::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 38%;
      height: 38%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 32%, rgba(255, 255, 255, 0.98) 0 18%, #fff 19% 100%);
      border: 7px solid #172033;
      box-shadow: inset 0 3px 8px rgba(23, 32, 51, 0.15), 0 2px 8px rgba(23, 32, 51, 0.2);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .side-panel {
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .draw-side-section .panel-body {
      padding: 12px;
    }

    .draw-side-section .section-title {
      font-size: 30px;
      line-height: 1.05;
    }

    .progress-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .progress-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 7px;
      background: #fff;
      min-width: 0;
    }

    .progress-card h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin: 0 0 5px;
      font-size: 22px;
      line-height: 1.12;
    }

    .progress-card h3 > span:first-child {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .progress-bar {
      height: 7px;
      border-radius: 999px;
      background: #e9edf7;
      overflow: hidden;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      width: var(--pct, 0%);
      background: var(--bar, var(--purple));
      border-radius: inherit;
    }

    .progress-members {
      display: grid;
      gap: 6px;
      margin-top: 6px;
    }

    .progress-member {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 7px;
      min-height: 36px;
      padding: 7px 7px;
      border-radius: var(--radius);
      background: var(--role-bg, #f7f9fe);
      border: 1px solid rgba(255, 255, 255, 0.74);
      color: #263247;
      font-weight: 900;
      font-size: 21px;
      line-height: 1.05;
    }

    .progress-member.appearing {
      animation: resultIn 520ms ease both;
    }

    .progress-member-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .progress-member-role {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #fff;
      color: var(--role-color, var(--ink));
      font-size: 15px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .progress-empty {
      margin-top: 6px;
      min-height: 28px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 17px;
      font-weight: 900;
    }

    .reveal-screen {
      min-height: 100vh;
      display: grid;
      align-items: center;
      gap: 24px;
    }

    .reveal-stage {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 360px;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(255, 189, 63, 0.14), transparent 40%),
        linear-gradient(225deg, var(--revealWash, rgba(124, 92, 255, 0.12)), transparent 44%),
        #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .revealed-capsule {
      position: relative;
      width: min(58vw, 260px);
      height: min(58vw, 260px);
      min-width: 170px;
      min-height: 170px;
      animation: capsuleDrop 900ms cubic-bezier(.2,.8,.2,1) both;
    }

    .cap-half {
      position: absolute;
      left: 0;
      width: 100%;
      height: 52%;
      box-shadow: inset 0 18px 24px rgba(255, 255, 255, 0.54), inset 0 -16px 28px rgba(36, 41, 68, 0.16), 0 18px 32px rgba(36, 41, 68, 0.18);
      border: 3px solid rgba(255, 255, 255, 0.9);
      animation-delay: 860ms;
      animation-duration: 900ms;
      animation-fill-mode: both;
      animation-timing-function: cubic-bezier(.25,.95,.35,1);
    }

    .cap-left {
      top: 0;
      border-radius: 999px 999px 32px 32px;
      background:
        radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.94) 0 9%, rgba(255, 255, 255, 0.42) 10% 20%, transparent 21%),
        #ef3f45;
      animation-name: capLeftOpen;
    }

    .cap-right {
      bottom: 0;
      border-radius: 32px 32px 999px 999px;
      background: #fbfdff;
      animation-name: capRightOpen;
    }

    .cap-right::before {
      content: "";
      position: absolute;
      left: 11%;
      right: 11%;
      top: -9px;
      height: 18px;
      border-radius: 999px;
      background: #172033;
      box-shadow: 0 3px 8px rgba(23, 32, 51, 0.14);
    }

    .cap-right::after {
      content: "";
      position: absolute;
      left: 50%;
      top: -34px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #fff;
      border: 12px solid #172033;
      box-shadow: inset 0 4px 10px rgba(23, 32, 51, 0.14), 0 4px 12px rgba(23, 32, 51, 0.18);
      transform: translateX(-50%);
    }

    .prize-chip {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(48%, 104px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.82) 0 14%, transparent 15% 30%),
        var(--prize, var(--purple));
      border: 10px solid rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 34px rgba(23, 32, 51, 0.24), inset 0 -12px 22px rgba(23, 32, 51, 0.18);
      opacity: 0;
      z-index: 1;
      transform: translate(-50%, -50%) scale(0.36);
      animation: prizeChipReveal 640ms cubic-bezier(.16,.9,.2,1.15) 3300ms both;
    }

    .result-burst {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      opacity: 0;
      animation: resultIn 740ms ease 4300ms both;
    }

    .result-burst h2 {
      margin: 0;
      font-size: clamp(34px, 8vw, 86px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .result-burst-card {
      max-width: min(92%, 680px);
      padding: clamp(20px, 3vw, 34px) clamp(24px, 4vw, 46px);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 22px 60px rgba(23, 32, 51, 0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .result-stack {
      display: grid;
      justify-items: center;
      width: min(92%, 680px);
    }

    .result-stack .result-burst-card {
      max-width: 100%;
    }

    .result-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
      min-height: 48px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: scale(0.86);
    }

    .result-actions.visible {
      visibility: visible;
      pointer-events: auto;
      animation: resultIn 520ms ease both;
    }

    .result-actions .btn {
      min-height: 48px;
      padding: 12px 18px;
      font-size: 18px;
    }

    .inline-reveal.settled .revealed-capsule {
      animation: none;
      transform: translate(-50%, -50%) scale(1);
    }

    .inline-reveal.settled .reveal-roulette-backdrop {
      animation: none;
      opacity: 0;
      transform: scale(0.72);
      filter: blur(3px);
    }

    .inline-reveal.settled .cap-half {
      animation: none;
    }

    .inline-reveal.settled .capsule-shake-shell {
      animation: none;
      transform: none;
    }

    .inline-reveal.settled .cap-left {
      transform: translateY(-54%) rotate(-10deg);
    }

    .inline-reveal.settled .cap-right {
      transform: translateY(42%) rotate(8deg);
    }

    .inline-reveal.settled .prize-chip {
      animation: none;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .inline-reveal.settled .result-burst {
      animation: none;
      opacity: 1;
      transform: scale(1);
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
    }

    .member-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 900;
    }

    .member-card-name {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .role-tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--role-bg, rgba(124, 92, 255, 0.1));
      color: var(--role-color, var(--purple));
      font-size: 13px;
      font-weight: 1000;
      white-space: nowrap;
    }

    .role-tag.senior {
      background: rgba(0, 168, 168, 0.1);
      color: #037979;
    }

    .role-tag.high2 {
      background: rgba(0, 168, 168, 0.1);
      color: #037979;
    }

    .role-tag.high3,
    .role-tag.high1 {
      background: rgba(124, 92, 255, 0.1);
      color: var(--purple);
    }

    .role-tag.high3 {
      background: rgba(238, 91, 168, 0.12);
      color: #b72c78;
    }

    .role-tag.middle3 {
      background: rgba(61, 187, 118, 0.12);
      color: #197048;
    }

    .role-tag.middle2 {
      background: rgba(255, 189, 63, 0.18);
      color: #8a5b00;
    }

    .role-tag.middle1 {
      background: rgba(47, 128, 237, 0.12);
      color: #1b5db6;
    }

    .role-tag.teacher {
      background: rgba(255, 107, 94, 0.12);
      color: #bb3028;
    }

    .board-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .group-board {
      display: grid;
      gap: 12px;
      align-content: start;
      min-height: 280px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
      box-shadow: 0 12px 28px rgba(32, 45, 72, 0.08);
    }

    .group-board h3 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: clamp(20px, 2.1vw, 26px);
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .group-board-title {
      min-width: 0;
    }

    .group-board-teacher {
      font: inherit;
      color: inherit;
    }

    .group-board .member-list {
      gap: 10px;
    }

    .group-board .member-card {
      min-height: 52px;
      padding: 13px 14px;
      font-size: 24px;
      line-height: 1.08;
    }

    .group-board .role-tag {
      min-height: 34px;
      padding: 6px 10px;
      font-size: 18px;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 220px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      font-weight: 900;
      text-align: center;
      padding: 20px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      background: rgba(13, 18, 31, 0.55);
      padding: 20px;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .modal {
      width: min(460px, 100%);
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .modal h2 {
      margin: 0 0 8px;
    }

    .modal p {
      margin: 0 0 18px;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.5;
    }

    #confetti {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 80;
      pointer-events: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(0.98) rotate(-2deg); }
      50% { transform: scale(1.02) rotate(2deg); }
    }

    @keyframes spinRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes keepCapsuleUpright {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    @keyframes spinRevealRing {
      from { transform: rotate(var(--ring-angle, 0deg)); }
      to { transform: rotate(calc(var(--ring-angle, 0deg) + 360deg)); }
    }

    @keyframes keepRevealCapsuleUpright {
      from { transform: rotate(var(--ring-angle-inverse, 0deg)); }
      to { transform: rotate(calc(var(--ring-angle-inverse, 0deg) - 360deg)); }
    }

    @keyframes capsuleDrop {
      0% { opacity: 0; transform: translateY(-180px) rotate(-22deg); }
      56% { opacity: 1; transform: translateY(0) rotate(8deg); }
      76% { transform: translateY(-18px) rotate(-4deg); }
      100% { transform: translateY(0) rotate(0); }
    }

    @keyframes selectedBallMove {
      0% {
        opacity: 1;
        transform: translate(calc(-50% + var(--pick-x, 0px)), calc(-50% + var(--pick-y, 0px))) scale(var(--pick-start-scale, 0.54)) rotate(-8deg);
      }
      46% {
        transform: translate(calc(-50% + var(--pick-mid-x, 0px)), calc(-50% + var(--pick-mid-y, 0px))) scale(0.82) rotate(6deg);
      }
      78% {
        transform: translate(-50%, -50%) scale(1.18) rotate(-2deg);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
    }

    @keyframes selectedBallShake {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      14% {
        transform: translate(-5px, 1px) scale(1.01) rotate(-3deg);
      }
      30% {
        transform: translate(5px, -2px) scale(1.01) rotate(3deg);
      }
      48% {
        transform: translate(-4px, 2px) scale(1.01) rotate(-2deg);
      }
      66% {
        transform: translate(3px, -1px) scale(1.005) rotate(2deg);
      }
      82% {
        transform: translate(-2px, 0) scale(1) rotate(-1deg);
      }
    }

    @keyframes revealRouletteAway {
      0% {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
      }
      58% {
        opacity: 0.38;
        filter: blur(1px);
        transform: scale(0.84);
      }
      100% {
        opacity: 0.12;
        filter: blur(3px);
        transform: scale(0.72);
      }
    }

    @keyframes capLeftOpen {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-54%) rotate(-10deg); }
    }

    @keyframes capRightOpen {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(42%) rotate(8deg); }
    }

    @keyframes prizeChipReveal {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.36);
      }
      70% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.12);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes resultIn {
      from { opacity: 0; transform: scale(0.86); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 980px) {
      .hero,
      .settings-grid,
      .draw-layout,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .settings-grid {
        grid-template-areas:
          "controls"
          "roster"
          "roles";
      }

      .role-overview {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stage-preview {
        min-height: 380px;
      }

      .preview-capsule {
        width: 82px;
        height: 82px;
        margin-left: -41px;
        margin-top: -41px;
        transform: rotate(var(--angle)) translateY(-145px) rotate(calc(-1 * var(--angle)));
      }

      .board-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .draw-main {
        min-height: auto;
      }
    }

    @media (max-width: 640px) {
      .app-menu {
        top: 10px;
        right: 10px;
      }

      .menu-panel {
        width: min(278px, calc(100vw - 20px));
      }

      .form-grid,
      .form-grid.three,
      .board-grid {
        grid-template-columns: 1fr;
      }

      .role-overview {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .callout,
      .panel-head {
        grid-template-columns: 1fr;
      }

      .participant-row {
        grid-template-columns: 1fr;
      }

      .group-edit-row {
        grid-template-columns: auto 1fr;
      }

      .group-edit-row .small-btn {
        grid-column: 1 / -1;
      }

      .capsule-stage {
        min-height: 360px;
      }

      .capsule-ring {
        width: min(94vw, 380px);
      }

      .capsule,
      .capsule-slot {
        --radius-size: clamp(116px, 34vw, 150px);
        width: 76px;
        height: 76px;
        margin-left: -38px;
        margin-top: -38px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .app-menu,
      .toolbar,
      .hero-actions,
      #confetti {
        display: none !important;
      }

      .screen {
        width: 100%;
        padding: 0;
      }

      .panel,
      .group-board {
        box-shadow: none;
      }

      .board-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
